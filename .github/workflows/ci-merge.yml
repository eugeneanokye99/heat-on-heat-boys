name: Merge CI

on:
    push:
        branches: [main]
        paths:
            - backend/**
            - .github/workflows/**

permissions:
    contents: read

jobs:
    ci:
        name: Backend merge checks + image build
        uses: ./.github/workflows/ci-reusable.yml
        with:
            run_checkstyle: true
            run_tests: true
            build_image: true
        secrets: inherit

    trigger-cd:
        name: Trigger CD pipeline
        runs-on: ubuntu-latest
        needs: ci
        steps:
            - name: Dispatch deploy event
              uses: peter-evans/repository-dispatch@v3
              with:
                  token: ${{ secrets.CD_REPO_PAT }}
                  repository: ioenimil/servicehub-manifests
                  event-type: deploy
                  client-payload: |
                      {"image_tag":"${{ needs.ci.outputs.image_tag }}","commit_sha":"${{ github.sha }}"}
